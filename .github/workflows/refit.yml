name: Refit weights

# Weekly: fits CATALGOS weights per category, gated on held-out AUC beating whatever's currently
# live. Two passes:
#   1. from logged human ratings (Supabase `ratings`, service_role — see T24), gated on volume
#      (>=150 ratings). A no-op until real ratings accumulate.
#   2. --synthetic (E1): from the eval triplets (eval/triplets.json) as pairwise ranking examples,
#      so the weights learn to agree with the LLM judge BEFORE 150 human ratings exist. Any
#      category that reaches >=150 human ratings ignores synthetic data (the ratings pass owns it).
# Runs after eval.yml (so it sees the freshest triplets). Shares the catalog-writes concurrency
# group so it queues safely rather than racing refresh/embed/eval.
on:
  schedule:
    - cron: '17 9 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: catalog-writes
  cancel-in-progress: false

jobs:
  refit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refit CATALGOS weights from ratings
        env:
          SB_SERVICE_KEY: ${{ secrets.SB_SERVICE_KEY }}
        run: node scripts/refit.mjs

      # E1: synthetic bootstrap from the eval triplets. Runs AFTER the ratings pass so it preserves
      # any category the ratings pass owns (>=150 human ratings); needs the key only to read those
      # rating counts (no key -> treats all as 0 and bootstraps every category).
      - name: Bootstrap weights from eval triplets (synthetic)
        env:
          SB_SERVICE_KEY: ${{ secrets.SB_SERVICE_KEY }}
        run: node scripts/refit.mjs --synthetic

      - name: Commit & push if changed
        run: |
          git config user.name  "muse-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sw.js
          if [ -f weights.json ]; then git add weights.json; fi
          if git diff --staged --quiet; then
            echo "No category cleared the refit gate this run."
            exit 0
          fi
          git commit -m "chore: refit CATALGOS weights from ratings"
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            echo "push attempt $i failed, retrying after backoff..."
            git rebase --abort 2>/dev/null || true
            sleep $((i * 5))
          done
          echo "FATAL: could not push after 3 attempts — the refit weights are NOT lost, they're still committed locally in this run's checkout, but the run is failing so it isn't silently dropped." >&2
          exit 1

      # scheduled-workflow failures are easy to miss (GitHub's own email notification for these is
      # unreliable) — file/update a tracking issue so a failure is actually visible somewhere.
      - name: File an issue if this run failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `${context.workflow} failed`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 50 });
            const existing = issues.find(i => i.title === title && !i.pull_request);
            if (existing) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body: `Failed again on \`${context.sha.slice(0,7)}\`: ${runUrl}` });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body: `The **${context.workflow}** workflow failed on \`${context.sha.slice(0,7)}\`.\n\n${runUrl}` });
            }
