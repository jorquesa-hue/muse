name: Grow catalog (food & travel)

# Weekly (E5): rebalances the catalog by growing the two starved categories — food and travel — toward
# >=600 with LLM-curated, Wikipedia-validated items (keyless). A cheap bulk LLM (Haiku) proposes
# canonical dishes/destinations with full metadata; each is validated against a real English Wikipedia
# page (title + thumbnail) before it's kept, so hallucinations are dropped. New items get `-tmdb`-style
# ids so enrich.mjs later re-rates them. Runs early in the weekly chain (before enrich/embed) so the
# fresh items flow through refresh -> ingest -> GROW -> enrich -> embed -> eval -> refit.
on:
  schedule:
    - cron: '27 6 * * 1'
  workflow_dispatch:
    inputs:
      max_items:
        description: 'Max NEW items per category this run (default 50)'
        required: false
        default: '50'
      target:
        description: 'Grow each category up to this size (default 600)'
        required: false
        default: '600'
      cats:
        description: 'Which categories to grow (comma-separated, e.g. "food")'
        required: false
        default: 'food,travel'

permissions:
  contents: write
  issues: write

concurrency:
  group: catalog-writes
  cancel-in-progress: false

jobs:
  grow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Grow food & travel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BULK_MODEL: ${{ vars.BULK_MODEL }}
          GROW_MAX_ITEMS: ${{ github.event.inputs.max_items }}
          GROW_TARGET: ${{ github.event.inputs.target }}
          GROW_CATS: ${{ github.event.inputs.cats }}
        run: node scripts/grow.mjs

      # grow.mjs writes data.json once at the end (accumulated items), so there's no partial-flush to
      # rescue; but keep the resilient !cancelled() guard for consistency with the other catalog jobs.
      - name: Commit & push if changed
        if: ${{ !cancelled() }}
        run: |
          git config user.name  "muse-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json sw.js
          if git diff --staged --quiet; then
            echo "No catalog growth this run."
            exit 0
          fi
          git commit -m "chore: grow food & travel catalog (E5)"
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            echo "push attempt $i failed, retrying after backoff..."
            git rebase --abort 2>/dev/null || true
            sleep $((i * 5))
          done
          echo "FATAL: could not push the catalog growth after 3 attempts." >&2
          exit 1

      - name: File an issue if this run failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `${context.workflow} failed`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 50 });
            const existing = issues.find(i => i.title === title && !i.pull_request);
            if (existing) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body: `Failed again on \`${context.sha.slice(0,7)}\`: ${runUrl}` });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body: `The **${context.workflow}** workflow failed on \`${context.sha.slice(0,7)}\`.\n\n${runUrl}` });
            }
