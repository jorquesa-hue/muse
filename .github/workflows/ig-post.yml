name: Instagram auto-post

# Publishes the next unposted card in ig/queue.json to Instagram via the official Graph API,
# then commits the updated queue (marks it posted). One post per run.
# Cron: Mon / Wed / Fri at 16:10 UTC. Also manual (workflow_dispatch), including a dry run.
#
# Requires repo secrets IG_USER_ID and IG_ACCESS_TOKEN (see docs/INSTAGRAM_AUTOPOST.md).
# If the secrets aren't set the job is a safe no-op (it just reports and exits).

on:
  schedule:
    - cron: '10 16 * * 1,3,5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (pick next post, print caption, do NOT publish)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: ig-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Guard — secrets present (skipped for dry run)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          if [ -z "$IG_USER_ID" ] || [ -z "$IG_ACCESS_TOKEN" ]; then
            echo "::notice::IG_USER_ID / IG_ACCESS_TOKEN not set — skipping (see docs/INSTAGRAM_AUTOPOST.md)."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - name: Publish next card
        if: ${{ env.SKIP != '1' }}
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
        run: node scripts/ig-post.mjs

      - name: Commit queue state
        if: ${{ env.SKIP != '1' && github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "muse-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ig/queue.json
          if git diff --staged --quiet; then echo "No queue change (nothing published)."; exit 0; fi
          git commit -m "chore: Instagram post published [skip ci]"
          for i in 1 2 3; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push; then exit 0; fi
            echo "push attempt $i failed, retrying…"; git rebase --abort 2>/dev/null || true; sleep $((i*5))
          done
          echo "FATAL: could not push the queue update." >&2; exit 1
