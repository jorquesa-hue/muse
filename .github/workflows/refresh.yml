name: Refresh catalog

# Weekly automated refresh: pulls trending movies/TV (TMDB) + trending books (Open Library),
# backfills localized titles, bumps the service worker, and commits — GitHub Pages redeploys.
on:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: catalog-writes
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh data (TMDB + Open Library)
        env:
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
        run: node scripts/refresh.mjs

      - name: Commit & push if changed
        run: |
          git config user.name  "muse-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json sw.js
          if git diff --staged --quiet; then
            echo "No catalog changes this run."
            exit 0
          fi
          git commit -m "chore: weekly catalog refresh"
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            echo "push attempt $i failed, retrying after backoff..."
            git rebase --abort 2>/dev/null || true
            sleep $((i * 5))
          done
          echo "FATAL: could not push after 3 attempts — the computed refresh is NOT lost, it's still committed locally in this run's checkout, but the run is failing so it isn't silently dropped." >&2
          exit 1
