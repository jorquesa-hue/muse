name: Build vibe embeddings

# Weekly (E2): writes a <=45-word "atmosphere" descriptor per catalog item with a cheap bulk LLM
# (Haiku), caches those texts by id in vibe/texts.json, then embeds them through the same local
# MiniLM path as embed.yml and packs vibe.b64.json — turns on the `vibemb` signal that lets
# cross-media matching lean on *feel* rather than shared genre words. Scheduled 30 min after
# embed.yml and before eval.yml; the shared catalog-writes concurrency group makes ordering safe
# even if a prior run overruns (this run just queues behind it).
#
# Texts are generated INCREMENTALLY (only items missing a cached text) and capped per run by
# MAX_ITEMS, so the scheduled cadence chips away at any backlog cheaply. To populate the whole
# catalog at once (e.g. the E2 ship gate), dispatch this workflow manually with a large MAX_ITEMS.
on:
  schedule:
    - cron: '47 7 * * 1'
  workflow_dispatch:
    inputs:
      max_items:
        description: 'Cap on NEW vibe texts generated this run (default 400)'
        required: false
        default: '400'

permissions:
  contents: write
  issues: write

concurrency:
  group: catalog-writes
  cancel-in-progress: false

jobs:
  vibe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # same MiniLM model + cache key as embed.yml — both stages share the one ONNX download.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: .cache
          key: embed-model-Xenova-all-MiniLM-L6-v2

      - name: Install embedding model deps
        run: npm install @xenova/transformers

      - name: Build vibe.b64.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BULK_MODEL: ${{ vars.BULK_MODEL }}
          MAX_ITEMS: ${{ github.event.inputs.max_items }}
        run: node scripts/vibe.mjs

      # Runs even when the build step FAILED (`!cancelled()`): the LLM text stage flushes
      # vibe/texts.json every 25 items, so a mid-run failure (rate limit, credits, network) still
      # leaves real, expensive progress on disk. Committing it means the NEXT run RESUMES from those
      # cached texts instead of regenerating the whole catalog from scratch. The job still reports
      # failure (this step succeeding doesn't mask the build step's non-zero exit) so the tracking
      # issue below still fires.
      - name: Commit & push if changed
        if: ${{ !cancelled() }}
        run: |
          git config user.name  "muse-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sw.js
          # vibe.b64.json only exists once the embed stage ran (i.e. all texts were generated); on a
          # partial/failed run it's absent, so guard the add rather than let it error.
          if [ -f vibe.b64.json ]; then git add vibe.b64.json; fi
          if [ -f vibe/texts.json ]; then git add vibe/texts.json; fi
          if git diff --staged --quiet; then
            echo "No vibe changes this run."
            exit 0
          fi
          git commit -m "chore: rebuild vibe embeddings"
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            echo "push attempt $i failed, retrying after backoff..."
            git rebase --abort 2>/dev/null || true
            sleep $((i * 5))
          done
          echo "FATAL: could not push after 3 attempts — the vibe texts/embeddings are NOT lost, they're still committed locally in this run's checkout, but the run is failing so it isn't silently dropped." >&2
          exit 1

      # scheduled-workflow failures are easy to miss (GitHub's own email notification for these is
      # unreliable) — file/update a tracking issue so a failure is actually visible somewhere.
      - name: File an issue if this run failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `${context.workflow} failed`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 50 });
            const existing = issues.find(i => i.title === title && !i.pull_request);
            if (existing) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body: `Failed again on \`${context.sha.slice(0,7)}\`: ${runUrl}` });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body: `The **${context.workflow}** workflow failed on \`${context.sha.slice(0,7)}\`.\n\n${runUrl}` });
            }
