name: Ingest searches
on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: ingest-searches
  cancel-in-progress: false
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Ingest live searches
        run: node scripts/ingest.mjs
      - name: Commit & push if changed
        run: |
          git config user.name  "muse-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json sw.js
          if git diff --staged --quiet; then
            echo "No new searched titles today."
          else
            git commit -m "chore: daily ingest of searched titles [skip ci]"
            git push
          fi
