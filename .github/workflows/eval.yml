name: Eval

# Weekly: measures the matching engine against an LLM judge via triplet accuracy (scripts/eval.mjs
# over engine-port.mjs, which is byte-identical to app.js scoring). Scheduled AFTER embed.yml so it
# judges the freshly-rebuilt embeddings, and before refit.yml (final chain: refresh -> ingest ->
# enrich -> embed -> eval -> refit). Commits eval/*.json only; the judge cache makes re-runs
# incremental (a triplet is never re-judged). Shares the catalog-writes concurrency group so its
# push to main queues safely rather than racing the other jobs.
on:
  schedule:
    - cron: '17 8 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: catalog-writes
  cancel-in-progress: false

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JUDGE_MODEL: ${{ vars.JUDGE_MODEL }}       # optional repo variable; blank -> script default
          MAX_JUDGE: ${{ vars.EVAL_MAX_JUDGE }}      # optional per-run cap on new API calls
        run: node scripts/eval.mjs

      - name: Commit & push if changed
        run: |
          git config user.name  "muse-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add eval/report.json eval/triplets.json
          if git diff --staged --quiet; then
            echo "No eval changes this run."
            exit 0
          fi
          git commit -m "chore: refresh eval report"
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            echo "push attempt $i failed, retrying after backoff..."
            git rebase --abort 2>/dev/null || true
            sleep $((i * 5))
          done
          echo "FATAL: could not push after 3 attempts — the eval report is committed locally in this run's checkout but the run is failing so it isn't silently dropped." >&2
          exit 1

      - name: File an issue if this run failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `${context.workflow} failed`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 50 });
            const existing = issues.find(i => i.title === title && !i.pull_request);
            if (existing) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body: `Failed again on \`${context.sha.slice(0,7)}\`: ${runUrl}` });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body: `The **${context.workflow}** workflow failed on \`${context.sha.slice(0,7)}\`.\n\n${runUrl}` });
            }
