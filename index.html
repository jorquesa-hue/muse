<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f6f4">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0c0c0e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Muse">
<meta name="application-name" content="Muse">
<title>Muse — taste engine</title>
<link rel="stylesheet" href="style.css">
</head>
<body><div class="device">
  <div class="screen">
    <div class="island" aria-hidden="true"></div>
    <div class="statusbar" aria-hidden="true">
      <span>9:41</span>
      <span class="sig">
        <svg viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity=".35"/></svg>
        <svg viewBox="0 0 18 12" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M2 5.2C4 3.4 6.4 2.4 9 2.4s5 1 7 2.8" stroke-linecap="round"/><path d="M4.4 7.6C5.7 6.5 7.3 5.9 9 5.9s3.3.6 4.6 1.7" stroke-linecap="round"/><path d="M6.8 10c.6-.6 1.4-.9 2.2-.9s1.6.3 2.2.9" stroke-linecap="round"/></svg>
        <svg viewBox="0 0 26 12" fill="none"><rect x="1" y="1" width="21" height="10" rx="2.6" stroke="currentColor" stroke-width="1.1" opacity=".5"/><rect x="2.6" y="2.6" width="14" height="6.8" rx="1.4" fill="currentColor"/><rect x="23.2" y="4" width="1.6" height="4" rx=".8" fill="currentColor" opacity=".5"/></svg>
      </span>
    </div>

    <div class="appscroll">
      <div class="topbar">
        <div class="brandrow">
          <div class="brand">
            <button class="wordmark" type="button" data-home aria-label="Home">muse<span class="dot" aria-hidden="true"></span></button>
            <span class="proto" id="protoTag">prototype</span>
          </div>
          <div class="langs" id="langs" role="group" aria-label="Language"></div>
        </div>
        <div class="searchbox">
          <div class="searchrow">
            <svg class="mag" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="M20 20l-3.6-3.6"></path></svg>
            <input id="q" type="text" autocomplete="off" spellcheck="false" aria-label="Search" role="combobox" aria-autocomplete="list" aria-haspopup="listbox" aria-controls="ac" aria-expanded="false" />
            <button class="dice" id="dice" type="button" aria-label="Surprise me"></button>
          </div>
          <div class="ac" id="ac" role="listbox" hidden></div>
        </div>
      </div>

      <nav class="cats" id="cats" aria-label="Categories"></nav>

      <div class="pitch" id="pitch">
        <h1 class="tagline" id="tagline"></h1>
        <p class="stats" id="stats"></p>
      </div>

      <main id="out"></main>

      <details class="lab" id="lab">
        <summary><svg class="fl" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 3h6M10 3v6.5L5.5 18a2 2 0 0 0 1.8 3h9.4a2 2 0 0 0 1.8-3L14 9.5V3"></path><path d="M7.5 14h9"></path></svg><span id="labTitle"></span><span class="arr">▾</span></summary>
        <div class="labgrid" id="labGrid"></div>
      </details>
      <p class="foot" id="foot"></p>
      <button class="suggest" type="button" data-suggest id="suggestBtn"></button>
    </div>

    <div class="homebar" aria-hidden="true"><i></i></div>
  </div>
</div>
<script>window.VIBRA_DATA = null;</script>
<script src="app.js"></script>
<script>if ('serviceWorker' in navigator) { window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js').catch(function (e) { console.warn('SW registration failed', e); }); }); }</script>
</body>
</html>
