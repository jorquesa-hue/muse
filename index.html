<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f6f4">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0c0c0e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Muse">
<meta name="application-name" content="Muse"><title>Muse — taste engine</title>
<style>
  :root{
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","Cascadia Code","Segoe UI Mono",Menlo,Consolas,monospace;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    /* dark (default) */
    --bg:#0c0c0e; --panel:#141416; --panel2:#191a1d;
    --line:rgba(255,255,255,.075); --line2:rgba(255,255,255,.14);
    --ink:#ededf0; --mut:#9b9ba4; --dim:#6a6a73; --faint:#3b3b42;
    --acc:#db5a54;
    --tsat:50%; --tl1:27%; --tl2:14%; --tfg:rgba(255,255,255,.92);
    --shadow:0 20px 46px -26px rgba(0,0,0,.85);
    --stage:radial-gradient(120% 90% at 50% -10%, #17171b, #08080a 72%);
    --frame:linear-gradient(150deg,#3a3a40,#171719 60%,#2a2a2e);
  }
  @media (prefers-color-scheme:light){
    :root{
      --bg:#f6f6f4; --panel:#ffffff; --panel2:#f1f1ee;
      --line:rgba(0,0,0,.08); --line2:rgba(0,0,0,.15);
      --ink:#18181b; --mut:#5b5b63; --dim:#8c8c94; --faint:#c8c8cc;
      --tsat:60%; --tl1:82%; --tl2:66%; --tfg:rgba(0,0,0,.74);
      --shadow:0 20px 46px -28px rgba(0,0,0,.28);
      --stage:radial-gradient(120% 90% at 50% -10%, #ecece9, #dcdcd8 75%);
      --frame:linear-gradient(150deg,#e6e6e3,#b9b9b4 60%,#d2d2ce);
    }
  }
  :root[data-theme="dark"]{
    --bg:#0c0c0e; --panel:#141416; --panel2:#191a1d;
    --line:rgba(255,255,255,.075); --line2:rgba(255,255,255,.14);
    --ink:#ededf0; --mut:#9b9ba4; --dim:#6a6a73; --faint:#3b3b42;
    --tsat:50%; --tl1:27%; --tl2:14%; --tfg:rgba(255,255,255,.92);
    --shadow:0 20px 46px -26px rgba(0,0,0,.85);
    --stage:radial-gradient(120% 90% at 50% -10%, #17171b, #08080a 72%);
    --frame:linear-gradient(150deg,#3a3a40,#171719 60%,#2a2a2e);
  }
  :root[data-theme="light"]{
    --bg:#f6f6f4; --panel:#ffffff; --panel2:#f1f1ee;
    --line:rgba(0,0,0,.08); --line2:rgba(0,0,0,.15);
    --ink:#18181b; --mut:#5b5b63; --dim:#8c8c94; --faint:#c8c8cc;
    --tsat:60%; --tl1:82%; --tl2:66%; --tfg:rgba(0,0,0,.74);
    --shadow:0 20px 46px -28px rgba(0,0,0,.28);
    --stage:radial-gradient(120% 90% at 50% -10%, #ecece9, #dcdcd8 75%);
    --frame:linear-gradient(150deg,#e6e6e3,#b9b9b4 60%,#d2d2ce);
  }

  html,body{margin:0;padding:0}
  body{background:var(--stage);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:26px 16px}
  ::selection{background:var(--acc);color:#fff}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
  h1,h2,h3{margin:0;text-wrap:balance;font-weight:400}
  svg{display:block}

  /* ============ device frame (desktop presentation) ============ */
  .device{width:392px;max-width:100%;padding:11px;border-radius:54px;background:var(--frame);
    box-shadow:var(--shadow),0 0 0 1px rgba(0,0,0,.4);flex:none}
  .screen{position:relative;height:min(812px,calc(100vh - 74px));border-radius:43px;overflow:hidden;
    background:var(--bg);display:flex;flex-direction:column}
  .island{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:108px;height:29px;
    background:#000;border-radius:16px;z-index:80;pointer-events:none}
  .statusbar{flex:none;height:46px;display:flex;align-items:flex-end;justify-content:space-between;
    padding:0 24px 7px;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink);letter-spacing:.02em}
  .statusbar .sig{display:flex;align-items:center;gap:6px}
  .statusbar .sig svg{width:17px;height:12px;color:var(--ink)}
  .homebar{flex:none;height:24px;display:flex;align-items:center;justify-content:center}
  .homebar i{width:132px;height:5px;border-radius:3px;background:var(--ink);opacity:.28}

  /* ============ scroll region ============ */
  .appscroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .appscroll::-webkit-scrollbar{display:none}

  /* ---------- sticky top bar ---------- */
  .topbar{position:sticky;top:0;z-index:40;padding:12px 16px 12px;border-bottom:1px solid var(--line);
    background:radial-gradient(135% 135% at 106% -34%, color-mix(in srgb, var(--acc) 14%, transparent), transparent 56%), var(--bg)}
  .brandrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
  .brand{display:flex;align-items:center;gap:9px;user-select:none}
  .wordmark{font-size:19px;font-weight:600;letter-spacing:-.01em;display:inline-flex;align-items:baseline;gap:2px}
  .wordmark .dot{width:5px;height:5px;border-radius:50%;background:var(--acc);align-self:flex-end;margin-bottom:3px;transition:background .5s ease}
  .proto{font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);
    border:1px solid var(--line2);padding:2px 6px;border-radius:5px}
  .langs{display:flex;gap:1px;border:1px solid var(--line);border-radius:8px;padding:2px}
  .langs button{font-family:var(--mono);font-size:10px;letter-spacing:.05em;color:var(--dim);padding:4px 8px;border-radius:6px;transition:color .2s,background .2s}
  .langs button.on{background:var(--ink);color:var(--bg)}

  /* ---------- search ---------- */
  .searchbox{position:relative}
  .searchrow{display:flex;align-items:center;gap:9px;background:var(--panel2);border:1px solid var(--line2);
    border-radius:12px;padding:3px 4px 3px 13px;transition:border-color .2s,box-shadow .2s}
  .searchrow:focus-within{border-color:color-mix(in srgb,var(--acc) 55%,var(--line2));
    box-shadow:0 0 0 3px color-mix(in srgb,var(--acc) 12%,transparent)}
  .searchrow>.mag{flex:none;color:var(--dim)}
  #q{flex:1;background:none;border:none;outline:none;color:var(--ink);font:inherit;font-size:16px;padding:11px 0;min-width:0}
  #q::placeholder{color:var(--dim)}
  .dice{flex:none;display:flex;align-items:center;justify-content:center;color:#fff;
    width:38px;height:38px;border-radius:9px;background:var(--acc);border:1px solid transparent;transition:opacity .2s,background .5s}
  .dice:hover,.dice:active{opacity:.85}
  .dice svg{width:16px;height:16px}
  .dice span{display:none}

  /* ---------- autocomplete ---------- */
  .ac{position:absolute;top:calc(100% + 7px);left:0;right:0;z-index:60;background:var(--panel);
    border:1px solid var(--line2);border-radius:13px;overflow:hidden;box-shadow:var(--shadow);max-height:340px;overflow-y:auto}
  .ac .grp{font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);padding:11px 15px 5px}
  .ac .opt{display:flex;align-items:center;gap:11px;padding:9px 15px;cursor:pointer}
  .ac .opt.sel,.ac .opt:active{background:color-mix(in srgb,var(--acc) 10%,transparent)}
  .ac .opt .mini{flex:none;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);font-size:15px;background:linear-gradient(150deg,hsl(var(--h) var(--tsat) var(--tl1)),hsl(var(--h) var(--tsat) var(--tl2)));color:var(--tfg)}
  .ac .opt .nm{font-size:13.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
  .ac .opt .yr{color:var(--dim);font-family:var(--mono);font-size:10.5px;margin-left:3px}
  .ac .opt .ct{margin-left:auto;font-size:10px;color:var(--mut);display:flex;gap:4px;align-items:center;flex:none}
  .ac .opt .ct svg{width:13px;height:13px;color:var(--dim)}
  .ac .none{font-family:var(--mono);font-size:10.5px;color:var(--dim);padding:13px 15px}

  /* ---------- categories (horizontal scroll) ---------- */
  .cats{display:flex;gap:6px;overflow-x:auto;padding:12px 16px 4px;scrollbar-width:none;scroll-snap-type:x proximity}
  .cats::-webkit-scrollbar{display:none}
  .cat{display:flex;align-items:center;gap:7px;white-space:nowrap;padding:8px 12px;border-radius:10px;flex:none;scroll-snap-align:start;
    border:1px solid var(--line);color:var(--mut);font-size:12.5px;font-weight:500;transition:border-color .2s,color .2s,background .2s}
  .cat:active{color:var(--ink)}
  .cat .ico{width:16px;height:16px;color:var(--c);transition:color .2s}
  .cat .ico svg{width:16px;height:16px}
  .cat.on{color:var(--ink);border-color:color-mix(in srgb,var(--c) 60%,transparent);background:color-mix(in srgb,var(--c) 10%,transparent)}
  .cat.on .ico{color:var(--c)}

  /* ---------- pitch (compact tagline) ---------- */
  .pitch{padding:14px 16px 2px}
  .pitch[hidden]{display:none}
  .tagline{font-size:22px;font-weight:300;letter-spacing:-.02em;line-height:1.15;max-width:16ch}
  .tagline em{font-style:normal;color:var(--acc);transition:color .5s ease}
  .stats{font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;color:var(--dim);margin:12px 0 0;line-height:1.6}
  .stats b{color:var(--mut);font-weight:400}
  .stats i{font-style:normal;color:var(--faint);margin:0 6px}

  /* ---------- hint / starter ---------- */
  .hint{color:var(--dim);font-size:12px;line-height:1.55;margin:12px 16px 0}
  .hint b{color:var(--mut);font-weight:500}
  .starter{display:flex;flex-wrap:wrap;align-items:center;gap:9px 12px;padding:14px 16px 4px;color:var(--dim);font-size:13px}
  .starter .lead{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);width:100%;margin-bottom:-3px}
  .starter .ex{color:var(--mut);border-bottom:1px solid var(--line2);padding-bottom:1px;transition:color .18s,border-color .18s}
  .starter .ex:active{color:var(--ink);border-color:var(--acc)}

  /* ---------- content sections ---------- */
  #out{padding:6px 16px 0;scroll-margin-top:112px}
  .sechead{display:flex;align-items:center;gap:12px;margin:24px 0 14px}
  .sechead h3{font-family:var(--mono);font-size:10.5px;font-weight:400;letter-spacing:.15em;text-transform:uppercase;color:var(--mut)}
  .sechead .sub{font-size:11px;color:var(--dim)}
  .sechead::after{content:"";flex:1;height:1px;background:var(--line)}

  /* ---------- tile ---------- */
  .tile{position:relative;border-radius:10px;overflow:hidden;flex:none;
    background:
      radial-gradient(115% 92% at 22% 12%, hsl(var(--h) var(--tsat) calc(var(--tl1) + 9%)), transparent 62%),
      linear-gradient(150deg, hsl(var(--h) var(--tsat) var(--tl1)), hsl(calc(var(--h) + 34) calc(var(--tsat) - 6%) var(--tl2)));
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.07)}
  .tile .mono{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--serif);color:var(--tfg);opacity:.9;line-height:1}
  .tile .tcat{position:absolute;left:7px;bottom:6px;color:var(--tfg);opacity:.5}
  .tile .tcat svg{width:14px;height:14px}

  /* ---------- source card ---------- */
  .source{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:17px;margin:10px 0 8px;display:flex;flex-direction:column;gap:12px}
  .shead{display:flex;gap:13px;align-items:center}
  .shead .tile{width:64px;aspect-ratio:3/4;flex:none}
  .shead .tile .mono{font-size:25px}
  .stitle{min-width:0;flex:1}
  .kicker{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);transition:color .5s}
  .source h2{font-size:20px;font-weight:500;letter-spacing:-.02em;line-height:1.15;margin-top:5px}
  .meta{color:var(--mut);font-size:12px;margin-top:4px}
  .meta b{color:var(--ink);font-weight:500}
  .chips{display:flex;gap:5px;flex-wrap:wrap}
  .chip{font-size:11px;font-weight:500;color:var(--mut);border:1px solid var(--line);padding:3px 9px;border-radius:7px}
  .chip.th{color:color-mix(in srgb,var(--acc) 78%,var(--ink));border-color:color-mix(in srgb,var(--acc) 28%,var(--line))}
  .desc{color:var(--mut);font-size:13px;line-height:1.55}
  .meters{display:flex;gap:16px;flex-wrap:wrap}
  .meter{flex:1;min-width:82px}
  .meter .lb{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
  .meter .lb b{color:var(--mut);font-weight:400}
  .track{height:3px;border-radius:99px;background:var(--line);overflow:hidden}
  .fill{height:100%;border-radius:99px;background:var(--acc);width:0;transition:width .8s cubic-bezier(.2,.7,.2,1)}

  /* ---------- match list (single column) ---------- */
  .grid{display:flex;flex-direction:column;gap:11px;margin-bottom:8px}
  .match{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:15px;cursor:pointer;
    transition:border-color .2s,transform .15s;display:flex;flex-direction:column;gap:12px}
  .match:active{transform:scale(.995)}
  .match.open{cursor:default}
  .mhead{display:flex;gap:12px;align-items:center}
  .mhead .tile{width:48px;aspect-ratio:1;border-radius:9px}
  .mhead .tile .mono{font-size:20px}
  .mhead .tile .tcat{display:none}
  .mhead .info{flex:1;min-width:0}
  .rank{font-family:var(--mono);font-size:9.5px;letter-spacing:.09em;color:var(--dim);display:flex;align-items:center;gap:6px}
  .quality{color:var(--acc);text-transform:uppercase;letter-spacing:.11em;transition:color .5s}
  .mhead .nm{font-size:14.5px;font-weight:600;letter-spacing:-.01em;line-height:1.25;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mhead .by{color:var(--mut);font-size:11.5px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ring{flex:none;position:relative;width:48px;height:48px}
  .ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12.5px;font-weight:500;letter-spacing:-.02em}
  .why{color:var(--mut);font-size:12px;line-height:1.5;padding-left:11px;border-left:1px solid color-mix(in srgb,var(--acc) 40%,var(--line))}
  .bars{display:flex;flex-direction:column;gap:8px}
  .bar .lb{display:flex;justify-content:space-between;font-size:10.5px;color:var(--mut);margin-bottom:4px}
  .bar .lb .v{color:var(--dim);font-family:var(--mono);font-variant-numeric:tabular-nums}
  .more{align-self:flex-start;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;padding:2px 0}
  .match:active .more{color:var(--acc)}
  .xpand{display:block}
  .radarbox{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
  .radarbox .cap{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--dim)}
  .radarbox svg{max-width:100%;height:auto}
  .legend{display:flex;gap:14px;font-size:10.5px;color:var(--mut)}
  .legend i{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px}

  /* ---------- beyond (snap carousel) ---------- */
  .beyond{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;padding:2px 16px 8px;margin:0 -16px;scrollbar-width:none}
  .beyond::-webkit-scrollbar{display:none}
  .bx{flex:0 0 168px;scroll-snap-align:start;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px;
    display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:border-color .2s,transform .15s}
  .bx:active{transform:scale(.99)}
  .bx .cathead{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase}
  .bx .cathead svg{width:13px;height:13px}
  .bx .row{display:flex;gap:10px;align-items:center}
  .bx .tile{width:40px;aspect-ratio:1;border-radius:8px}
  .bx .tile .mono{font-size:17px}
  .bx .tile .tcat{display:none}
  .bx .nm{font-size:12.5px;font-weight:600;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bx .subby{color:var(--dim);font-size:10.5px;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bx .pc{margin-left:auto;font-family:var(--mono);font-size:12.5px;font-weight:500;font-variant-numeric:tabular-nums}
  .bx .why{font-size:11px;border:none;padding:0;color:var(--dim);line-height:1.45}

  /* ---------- algorithm lab ---------- */
  .lab{border:1px solid var(--line);border-radius:14px;margin:20px 16px 18px;overflow:hidden}
  .lab summary{list-style:none;display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;color:var(--mut);font-size:12.5px}
  .lab summary::-webkit-details-marker{display:none}
  .lab summary .fl{color:var(--dim);flex:none}
  .lab summary .arr{margin-left:auto;transition:transform .25s;color:var(--dim)}
  .lab[open] summary .arr{transform:rotate(180deg)}
  .lab .labgrid{display:flex;flex-direction:column;gap:9px;padding:0 16px 16px}
  .alg{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:12px 13px}
  .alg .nm{display:flex;justify-content:space-between;align-items:baseline;gap:8px;font-size:12.5px;font-weight:600;margin-bottom:5px}
  .alg .w{color:var(--acc);font-family:var(--mono);font-size:10.5px;font-variant-numeric:tabular-nums;transition:color .5s;flex:none}
  .alg .ds{color:var(--dim);font-size:11px;line-height:1.5}

  .foot{color:var(--dim);font-size:10.5px;line-height:1.65;padding:0 16px 10px;margin:0}
  .foot b{color:var(--mut);font-weight:500}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}

  /* ============ real phone: drop the frame, fill the screen ============ */
  @media (max-width:560px){
    body{padding:0;display:block;background:var(--bg)}
    .device{width:100%;max-width:100%;padding:0;border-radius:0;box-shadow:none;background:var(--bg)}
    .screen{height:100vh;height:100dvh;border-radius:0}
    .island,.statusbar,.homebar{display:none}
    .appscroll{padding-top:env(safe-area-inset-top)}
    .appscroll{padding-bottom:env(safe-area-inset-bottom)}
  }
</style>

</head>
<body>
<div class="device">
  <div class="screen">
    <div class="island" aria-hidden="true"></div>
    <div class="statusbar" aria-hidden="true">
      <span>9:41</span>
      <span class="sig">
        <svg viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity=".35"/></svg>
        <svg viewBox="0 0 18 12" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M2 5.2C4 3.4 6.4 2.4 9 2.4s5 1 7 2.8" stroke-linecap="round"/><path d="M4.4 7.6C5.7 6.5 7.3 5.9 9 5.9s3.3.6 4.6 1.7" stroke-linecap="round"/><path d="M6.8 10c.6-.6 1.4-.9 2.2-.9s1.6.3 2.2.9" stroke-linecap="round"/></svg>
        <svg viewBox="0 0 26 12" fill="none"><rect x="1" y="1" width="21" height="10" rx="2.6" stroke="currentColor" stroke-width="1.1" opacity=".5"/><rect x="2.6" y="2.6" width="14" height="6.8" rx="1.4" fill="currentColor"/><rect x="23.2" y="4" width="1.6" height="4" rx=".8" fill="currentColor" opacity=".5"/></svg>
      </span>
    </div>

    <div class="appscroll">
      <div class="topbar">
        <div class="brandrow">
          <div class="brand">
            <span class="wordmark">muse<span class="dot" aria-hidden="true"></span></span>
            <span class="proto" id="protoTag">prototype</span>
          </div>
          <div class="langs" id="langs" role="group" aria-label="Language"></div>
        </div>

/* ================= math & similarity ================= */
const norm = s => String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]+/g,' ').replace(/\s+/g,' ').trim();
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function cosSets(a,b){ a=a||[]; b=b||[]; if(!a.length||!b.length) return 0;
  const A=new Set(a), B=new Set(b); let i=0; A.forEach(x=>{ if(B.has(x)) i++; });
  return i/Math.sqrt(A.size*B.size); }
/* IDF weighting: sharing a rare tag ("cyberpunk") counts far more than a generic one ("drama") */
const themeIDF={}, genreIDF={};
function buildIDF(list){ const N=Math.max(1,list.length), td={}, gd={};
  list.forEach(it=>{ Array.from(new Set(it.th||[])).forEach(t=>td[t]=(td[t]||0)+1);
    Array.from(new Set(it.g||[])).forEach(g=>gd[g]=(gd[g]||0)+1); });
  for(const t in td) themeIDF[t]=Math.log(N/td[t])+1;
  for(const g in gd) genreIDF[g]=Math.log(N/gd[g])+1; }
function wCos(a,b,idf){ a=a||[]; b=b||[]; if(!a.length||!b.length) return 0;
  const A=new Set(a), B=new Set(b); let dot=0, na=0, nb=0;
  A.forEach(t=>{ const w=idf[t]||1; na+=w*w; if(B.has(t)) dot+=w*w; });
  B.forEach(t=>{ const w=idf[t]||1; nb+=w*w; });
  return (na&&nb)? dot/Math.sqrt(na*nb) : 0; }
function dnaSim(a,b){ if(!a||!b||a.length!==8||b.length!==8) return .4;
  let s=0; for(let i=0;i<8;i++){ const d=(a[i]-b[i])/100; s+=d*d; }
  return Math.max(0, 1-Math.sqrt(s/8)*1.7); }
function featSim(xa,xb,keys){ let s=0; keys.forEach(k=>{ const d=((xa[k]||0)-(xb[k]||0))/100; s+=d*d; });
  return Math.max(0, 1-Math.sqrt(s/keys.length)*1.6); }
function prox(a,b,span){ if(a==null||b==null) return .5; return Math.max(0, 1-Math.abs(a-b)/span); }
function eraSim(a,b,sg){ if(a.y==null||b.y==null) return .5; const d=a.y-b.y; return Math.exp(-d*d/(2*sg*sg)); }
function creatorSim(a,b){
  if(a.by&&b.by&&norm(a.by)===norm(b.by)) return 1;
  const xa=a.x||{}, xb=b.x||{};
  if(xa.st&&xb.st&&xa.st===xb.st) return .8;
  const ca=(a.cast||[]).map(norm), cb=(b.cast||[]).map(norm);
  if(ca.some(x=>x&&cb.includes(x))) return .65;
  return 0; }
function cultureSim(a,b){
  const ca=(a.x&&a.x.reg)||a.c, cb=(b.x&&b.x.reg)||b.c;
  if(!ca||!cb) return 0; if(ca===cb) return 1;
  return (REGIONS[ca]&&REGIONS[ca]===REGIONS[cb]) ? .55 : 0; }
function audSim(a,b){ return Math.max(0, 1-(Math.abs(a.pop-b.pop)+Math.abs(a.acc-b.acc)+Math.abs(a.main-b.main))/300); }

const CRAFT_FN = {
  movies:(a,b)=>{const xa=a.x||{},xb=b.x||{};return featSim(xa,xb,['vis','dlg','twist'])*.8+prox(xa.run,xb.run,90)*.2;},
  tv:(a,b)=>{const xa=a.x||{},xb=b.x||{};return featSim(xa,xb,['ser','binge'])*.6+prox(xa.ep,xb.ep,40)*.2+prox(xa.sea,xb.sea,8)*.2;},
  books:(a,b)=>{const xa=a.x||{},xb=b.x||{};return featSim(xa,xb,['lit','plot','exp'])*.8+prox(xa.pg,xb.pg,600)*.2;},
  music:(a,b)=>{const xa=a.x||{},xb=b.x||{};return featSim(xa,xb,['nrg','val','aco','dan'])*.7+cosSets(xa.inst,xb.inst)*.3;},
  games:(a,b)=>{const xa=a.x||{},xb=b.x||{};return featSim(xa,xb,['dif','story','open'])*.6+cosSets(xa.mech,xb.mech)*.3+prox(Math.min(xa.len||0,120),Math.min(xb.len||0,120),100)*.1;},
  anime:(a,b)=>{const xa=a.x||{},xb=b.x||{};return featSim(xa,xb,['act','art','emo']);},
  food:(a,b)=>{const xa=a.x||{},xb=b.x||{};return featSim(xa,xb,['spice','rich','sweet','prep'])*.6+cosSets(xa.fl,xb.fl)*.4;},
  travel:(a,b)=>{const xa=a.x||{},xb=b.x||{};return featSim(xa,xb,['nat','adv','bud','off']);},
};
const ALGO_FN = {
  theme:(a,b)=>wCos(a.th,b.th,themeIDF),
  mood:(a,b)=>dnaSim(a.dna,b.dna),
  genre:(a,b)=>wCos(a.g,b.g,genreIDF),
  creator:creatorSim,
  culture:cultureSim,
  audience:audSim,
  ing:(a,b)=>cosSets((a.x||{}).ing,(b.x||{}).ing),
  tech:(a,b)=>((a.x||{}).tech&&(a.x||{}).tech===(b.x||{}).tech)?1:0,
  vibe:(a,b)=>cosSets((a.x||{}).vibe,(b.x||{}).vibe),
  climate:(a,b)=>{const A=(a.x||{}).climate,B=(b.x||{}).climate; if(!A||!B) return 0; if(A===B) return 1;
    const mild=['temperate','mediterranean']; return (mild.includes(A)&&mild.includes(B))?.5:0;},
  srcdem:(a,b)=>{const xa=a.x||{},xb=b.x||{};return (xa.src===xb.src?.5:0)+(xa.dem===xb.dem?.5:0);},
};
const CATALGOS = {
  movies:[['theme',.20],['mood',.20],['genre',.15],['craft',.13],['creator',.10],['era',.08],['audience',.08],['culture',.06]],
  tv:    [['theme',.20],['mood',.20],['genre',.15],['craft',.13],['creator',.08],['era',.08],['audience',.10],['culture',.06]],
  books: [['theme',.22],['mood',.20],['genre',.14],['craft',.14],['creator',.08],['era',.08],['audience',.08],['culture',.06]],
  music: [['craft',.22],['mood',.20],['genre',.16],['theme',.12],['creator',.08],['era',.10],['audience',.06],['culture',.06]],
  games: [['craft',.22],['genre',.18],['mood',.16],['theme',.12],['creator',.06],['era',.08],['audience',.10],['culture',.08]],
  anime: [['theme',.18],['mood',.18],['genre',.16],['craft',.14],['creator',.12],['era',.08],['audience',.08],['srcdem',.06]],
  food:  [['craft',.26],['ing',.12],['tech',.06],['genre',.14],['mood',.14],['theme',.10],['culture',.12],['audience',.06]],
  travel:[['craft',.24],['vibe',.14],['mood',.16],['theme',.12],['genre',.12],['climate',.08],['culture',.08],['audience',.06]],
};
function algoValue(id,a,b,cat){
  if(id==='craft') return CRAFT_FN[cat](a,b);
  if(id==='era') return eraSim(a,b,CATS[cat].sigma||10);
  return ALGO_FN[id](a,b);
}
function score(a,b,cat){
  const parts={}; let total=0;
  CATALGOS[cat].forEach(([id,w])=>{ const v=Math.max(0,Math.min(1,algoValue(id,a,b,cat))); parts[id]=v; total+=v*w; });
  return { parts, total, pct: Math.min(99, Math.round(100*Math.pow(total,.8))) };
}
function crossScore(a,b){
  const v=.55*dnaSim(a.dna,b.dna)+.35*wCos(a.th,b.th,themeIDF)+.10*audSim(a,b);
  return Math.min(99, Math.round(100*Math.pow(v,.9)));
}
function lev(a,b,max){
  if(Math.abs(a.length-b.length)>max) return max+1;
  const n=b.length; if(!a.length) return n; if(!n) return a.length;
  let prev=[],cur=[]; for(let j=0;j<=n;j++) prev[j]=j;
  for(let i=1;i<=a.length;i++){ cur[0]=i; let best=i;
    for(let j=1;j<=n;j++){ cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1)); if(cur[j]<best)best=cur[j]; }
    if(best>max) return max+1; const t=prev; prev=cur; cur=t; }
  return prev[n];
}

/* ================= html builders ================= */
function monogram(it){ const s=String(it.t||'?').trim(); const ch=s.charAt(0)||'?'; return esc(ch.toUpperCase()); }
function tile(it){ const h=(it.hue==null?222:it.hue)%360;
  return '<div class="tile" style="--h:'+h+'"><span class="mono">'+monogram(it)+'</span><span class="tcat">'+(CAT_ICON[it._cat]||'')+'</span></div>'; }
function qualColor(p){ return p>=85?'#3ab481':p>=70?'#7fae52':p>=55?'#d29a3c':'#a37c73'; }
function ring(pct){ const col=qualColor(pct), r=24, c=2*Math.PI*r;
  return '<div class="ring"><svg viewBox="0 0 56 56" width="100%" height="100%" aria-hidden="true"><circle cx="28" cy="28" r="'+r+'" stroke="var(--line2)" stroke-width="4.5" fill="none"></circle><circle cx="28" cy="28" r="'+r+'" stroke="'+col+'" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-dasharray="'+(c*pct/100).toFixed(1)+' '+c.toFixed(1)+'"></circle></svg><span class="num" style="color:'+col+'">'+pct+'</span></div>'; }
function bar(label,pct){ return '<div class="bar"><div class="lb"><span>'+esc(label)+'</span><span class="v">'+pct+'%</span></div><div class="track"><div class="fill" data-w="'+pct+'"></div></div></div>'; }
function meter(label,val){ return '<div class="meter"><div class="lb"><span>'+esc(label)+'</span><b>'+val+'</b></div><div class="track"><div class="fill" data-w="'+val+'"></div></div></div>'; }
function radar(dnaA,dnaB){
  const R=72,cx=110,cy=92;
  const pt=(i,v)=>{ const ang=Math.PI*2*i/8-Math.PI/2, rr=R*v/100; return [(cx+rr*Math.cos(ang)),(cy+rr*Math.sin(ang))]; };
  const poly=d=>d.map((v,i)=>pt(i,v).map(n=>n.toFixed(1)).join(',')).join(' ');
  let s='<svg width="220" height="188" viewBox="0 0 220 188" aria-hidden="true">';
  [25,50,75,100].forEach(v=>{ s+='<polygon points="'+poly([v,v,v,v,v,v,v,v])+'" fill="none" stroke="rgba(255,255,255,.06)"></polygon>'; });
  for(let i=0;i<8;i++){ const p=pt(i,100); s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="rgba(255,255,255,.05)"></line>'; }
  s+='<polygon points="'+poly(dnaA)+'" style="fill:rgba(255,255,255,.09);stroke:rgba(255,255,255,.45);stroke-width:1.3"></polygon>';
  s+='<polygon points="'+poly(dnaB)+'" style="fill:color-mix(in srgb,var(--acc) 20%,transparent);stroke:var(--acc);stroke-width:1.6"></polygon>';
  for(let i=0;i<8;i++){ const ang=Math.PI*2*i/8-Math.PI/2, lx=cx+R*1.24*Math.cos(ang), ly=cy+R*1.24*Math.sin(ang);
    const anchor=Math.cos(ang)>.35?'start':Math.cos(ang)<-.35?'end':'middle';
    s+='<text x="'+lx.toFixed(1)+'" y="'+(ly+3.5).toFixed(1)+'" text-anchor="'+anchor+'" font-size="9.5" letter-spacing=".08em" fill="rgba(255,255,255,.4)">'+esc(tr(DNA_AX[i]).toUpperCase())+'</text>'; }
  return s+'</svg>';
}
function metaLine(it){
  const bits=[]; if(it.y) bits.push(String(it.y));
  if(it.by) bits.push('<b>'+esc(it.by)+'</b>');
  const reg=(it.x&&it.x.reg)||it.c; if(reg&&reg!==it.by) bits.push(esc(reg));
  return bits.join(' · ');
}
function whyText(a,b,cat,parts){
  const ranked=CATALGOS[cat].map(([id,w])=>({id,c:(parts[id]||0)*w,v:parts[id]||0})).sort((x,y)=>y.c-x.c);
  const ph=[];
  for(const r of ranked){
    if(ph.length>=3) break; if(r.v<.42) continue;
    if(r.id==='theme'){ const sh=(a.th||[]).filter(t=>(b.th||[]).includes(t)).slice(0,2).map(themeLabel);
      if(sh.length) ph.push(tr(WHY_THEME,{x:sh.join(' + ')})); }
    else if(r.id==='genre'){ const sh=(a.g||[]).filter(t=>(b.g||[]).includes(t));
      if(sh.length) ph.push(tr(WHY_GENRE,{x:sh[0]})); }
    else if(r.id==='craft') ph.push(tr(WHY_CRAFT[cat]));
    else if(WHY[r.id]) ph.push(tr(WHY[r.id]));
  }
  if(!ph.length) ph.push(tr(WHY.mood));
  const s=ph.slice(0,3).join(' · ');
  return s.charAt(0).toUpperCase()+s.slice(1);
}

  $('langs').innerHTML=['en','es','pt'].map(l=>'<button data-lang="'+l+'" class="'+(l===state.lang?'on':'')+'">'+l.toUpperCase()+'</button>').join('');
  $('cats').innerHTML=CAT_ORDER.map(k=>{ const c=CATS[k];
    return '<button class="cat '+(k===state.cat?'on':'')+'" data-cat="'+k+'" style="--c:'+c.acc+'"><span class="ico">'+(CAT_ICON[k]||'')+'</span>'+esc(tr(c.name))+'</button>'; }).join('');
  $('labGrid').innerHTML=CATALGOS[state.cat].map(([id,w])=>{
    const nm=id==='craft'?tr(CRAFT_NAMES[state.cat]):tr(ALGO_NAMES[id]);
    return '<div class="alg"><div class="nm"><span>'+esc(nm)+'</span><span class="w">'+Math.round(w*100)+'% '+tr(T.weight)+'</span></div><div class="ds">'+esc(tr(ALGO_DESCS[id]))+'</div></div>'; }).join('');
}
function suggCards(items){ return '<div class="sugg">'+items.map(it=>
  '<button class="sg" data-sel="'+esc(it.id)+'">'+tile(it)+'<span class="t">'+esc(it.t)+'</span><span class="y">'+(it.y||esc((it.x&&it.x.reg)||it.c||''))+'</span></button>').join('')+'</div>'; }
function renderEmpty(){
  $('out').innerHTML='';
}
function matchCard(src,m,i){
  const open=state.open===m.it.id;
  const algos=CATALGOS[state.cat].map(([id])=>({id, nm:id==='craft'?tr(CRAFT_NAMES[state.cat]):tr(ALGO_NAMES[id]), v:Math.round((m.s.parts[id]||0)*100)}));
  const top2=algos.slice().sort((a,b)=>b.v-a.v).slice(0,2);
  const why='<div class="why">'+esc(whyText(src,m.it,state.cat,m.s.parts))+'</div>';
  const head='<div class="mhead">'+tile(m.it)+'<div class="info"><div class="rank">#'+(i+1)+' · <span class="quality">'+esc(qual(m.s.pct))+'</span></div><div class="nm">'+esc(m.it.t)+'</div><div class="by">'+metaLine(m.it)+'</div></div>'+ring(m.s.pct)+'</div>';
  if(!open){
    return '<article class="match" data-mid="'+esc(m.it.id)+'">'+head+why+'<div class="bars">'+top2.map(a=>bar(a.nm,a.v)).join('')+'</div><div class="more">'+tr(T.expand)+' ↓</div></article>';
  }
  const shared=(src.th||[]).filter(t=>(m.it.th||[]).includes(t));
  const chips=shared.length?'<div><div class="rank" style="margin:10px 0 7px">'+tr(T.sharedThemes).toUpperCase()+'</div><div class="chips">'+shared.map(t=>'<span class="chip th">'+esc(themeLabel(t))+'</span>').join('')+'</div></div>':'';
  return '<article class="match open" data-mid="'+esc(m.it.id)+'">'+head+
    '<div class="xpand"><div>'+why+'<div class="bars" style="margin-top:12px">'+algos.map(a=>bar(a.nm,a.v)).join('')+'</div>'+chips+
    '<p class="desc">'+esc((m.it.d&&(m.it.d[state.lang]||m.it.d.en))||'')+'</p>'+
    '<button class="more" data-sel="'+esc(m.it.id)+'">'+tr(T.exploreFrom)+'</button></div>'+
    '<div class="radarbox"><span class="cap">'+tr(T.dnaCap)+'</span>'+radar(src.dna||[50,50,50,50,50,50,50,50],m.it.dna||[50,50,50,50,50,50,50,50])+
    '<div class="legend"><span><i style="background:rgba(255,255,255,.45)"></i>'+tr(T.srcLegend)+'</span><span><i style="background:var(--acc)"></i>'+tr(T.matchLegend)+'</span></div></div></div>'+
    '<div class="more">'+tr(T.collapse)+' ↑</div></article>';
}
function renderResults(){
  const src=byId[state.sel]; if(!src){ renderEmpty(); return; }
  const cat=state.cat;
  const matches=(D[cat]||[]).filter(x=>x.id!==src.id).map(it=>({it,s:score(src,it,cat)})).sort((a,b)=>b.s.total-a.s.total).slice(0,10);
  const beyond=CAT_ORDER.filter(k=>k!==cat).map(k=>{
    let best=null,bp=-1; (D[k]||[]).forEach(it=>{ const p=crossScore(src,it); if(p>bp){bp=p;best=it;} });
    return best?{cat:k,it:best,pct:bp}:null; }).filter(Boolean);
  const srcCard='<section class="source"><div class="shead">'+tile(src)+'<div class="stitle"><div class="kicker">'+tr(T.kicker)+' · '+esc(tr(CATS[cat].name)).toUpperCase()+'</div><h2>'+esc(src.t)+'</h2><div class="meta">'+metaLine(src)+'</div></div></div>'+
    '<div class="chips">'+(src.g||[]).map(g=>'<span class="chip">'+esc(g)+'</span>').join('')+(src.th||[]).slice(0,4).map(t=>'<span class="chip th">'+esc(themeLabel(t))+'</span>').join('')+'</div>'+
    '<p class="desc">'+esc((src.d&&(src.d[state.lang]||src.d.en))||'')+'</p>'+
    '<div class="meters">'+meter(tr(T.pop),src.pop)+meter(tr(T.acc),src.acc)+meter(tr(T.main),src.main)+'</div></section>';
  const list='<div class="sechead"><h3>'+tr(T.topMatches)+'</h3><span class="sub">'+tr(T.topSub)+'</span></div><div class="grid">'+matches.map((m,i)=>matchCard(src,m,i)).join('')+'</div>';
  const bey='<div class="sechead"><h3>'+esc(tr(T.beyond))+'</h3><span class="sub">'+tr(T.beyondSub)+'</span></div><div class="beyond">'+beyond.map(b=>{
    const c=CATS[b.cat];
    return '<div class="bx" data-sel="'+esc(b.it.id)+'" style="--acc:'+c.acc+'"><div class="cathead" style="color:'+c.acc+'">'+(CAT_ICON[b.cat]||'')+esc(tr(c.name))+'</div><div class="row">'+tile(b.it)+'<div><div class="nm">'+esc(b.it.t)+'</div><div class="subby">'+esc(b.it.by||'')+'</div></div><span class="pc" style="color:'+c.acc+'">'+b.pct+'</span></div><div class="why">'+esc(whyCross(src,b.it))+'</div></div>'; }).join('')+'</div>';
  $('out').innerHTML=srcCard+list+bey;
  animateFills($('out'));
}
function whyCross(a,b){
  const sh=(a.th||[]).filter(t=>(b.th||[]).includes(t)).slice(0,2).map(themeLabel);
  if(sh.length){ const s=tr(WHY_THEME,{x:sh.join(' + ')}); return s.charAt(0).toUpperCase()+s.slice(1); }
  return tr(WHY.mood).charAt(0).toUpperCase()+tr(WHY.mood).slice(1);
}
function renderAll(){ setAccent(); renderChrome(); const pit=$('pitch'),lab=$('lab'),foot=$('foot');
  if(!dataOK){ if(pit) pit.hidden=false; $('out').innerHTML='<p class="hint">'+tr(T.dataMissing)+'</p>'; return; }
  renderResults(); const home=!state.sel;
  if(pit) pit.hidden=!home;
  if(lab) lab.style.display=home?'none':'';
  if(foot) foot.style.display='none';
  animateFills(document.body); }

/* ================= autocomplete ================= */
let acItems=[], acIdx=-1;
function suggScore(qq,it){
  let best=0;
  for(const k of it._keys){
    if(!k) continue; let s=0;
    if(k===qq) s=120;
    else if(k.startsWith(qq)) s=100-Math.min(20,(k.length-qq.length)*.5);
    else { const words=k.split(' ');
      if(words.some(w=>w.startsWith(qq))) s=84;
      else if(qq.length>=3&&k.indexOf(qq)>=0) s=72;
      else if(qq.length>=4){
        const d=lev(qq,k,2); if(d<=2) s=68-9*d;
        else for(const w of words){ if(Math.abs(w.length-qq.length)<=2){ const dw=lev(qq,w,2); if(dw<=2) s=Math.max(s,60-8*dw); } } } }
    if(s>best) best=s; }
  return best? best+(it.pop||0)*.08 : 0;
}
function suggest(qq){
  qq=norm(qq); if(!qq) return {same:[],other:[]};
  const scored=ALL.map(it=>({it,s:suggScore(qq,it)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);
  return { same:scored.filter(x=>x.it._cat===state.cat).slice(0,6), other:scored.filter(x=>x.it._cat!==state.cat).slice(0,4) };
}
function renderAC(){
  const el=$('ac'); const v=$('q').value;
  if(!v.trim()){ el.hidden=true; acItems=[]; return; }
  const {same,other}=suggest(v); acItems=same.concat(other); acIdx=acItems.length?0:-1;
  if(!acItems.length){ el.innerHTML='<div class="grp" style="padding-bottom:12px">'+tr(T.notFound)+'</div>'; el.hidden=false; return; }
  let h='';
  if(same.length){ h+='<div class="grp">'+esc(tr(CATS[state.cat].name))+'</div>'+same.map((x,i)=>acOpt(x.it,i)).join(''); }
  if(other.length){ h+='<div class="grp">'+tr(T.otherWorlds)+'</div>'+other.map((x,i)=>acOpt(x.it,same.length+i)).join(''); }
  el.innerHTML=h; el.hidden=false;
}
function acOpt(it,i){
  const c=CATS[it._cat]; const h=(it.hue==null?222:it.hue)%360;
  return '<div class="opt'+(i===acIdx?' sel':'')+'" data-i="'+i+'"><span class="mini" style="--h:'+h+'">'+monogram(it)+'</span><span class="nm">'+esc(it.t)+(it.y?' <span class="yr">'+it.y+'</span>':'')+'</span><span class="ct">'+(CAT_ICON[it._cat]||'')+esc(tr(c.name))+'</span></div>';
}
function hideAC(){ $('ac').hidden=true; acItems=[]; acIdx=-1; }
function pick(i){ if(i<0||i>=acItems.length) return; select(acItems[i].it.id,true); }

/* ================= actions ================= */
function select(id,scroll){
  const it=byId[id]; if(!it) return;
  state.cat=it._cat; state.sel=id; state.open=null;
  $('q').value=it.t; hideAC(); renderAll();
  if(scroll){ const o=$('out'); if(o&&o.scrollIntoView) o.scrollIntoView({behavior:'smooth',block:'start'}); }
}
function surprise(){
  const pool=(D[state.cat]||[]); if(!pool.length) return;
  const hot=pool.filter(p=>p.pop>=55); const src=(hot.length?hot:pool);
  select(src[Math.floor(Math.random()*src.length)].id,true);
}

/* ================= events ================= */
document.addEventListener('click',e=>{
  const lb=e.target.closest('[data-lang]');
  if(lb){ state.lang=lb.dataset.lang; try{localStorage.setItem('vibra-lang',state.lang);}catch(err){} renderAll(); return; }
  const cb=e.target.closest('[data-cat]');
  if(cb){ if(state.cat!==cb.dataset.cat){ state.cat=cb.dataset.cat; state.sel=null; state.open=null; $('q').value=''; renderAll(); } return; }
  const sb=e.target.closest('[data-sel]');
  if(sb){ e.stopPropagation(); select(sb.dataset.sel,true); return; }
  const card=e.target.closest('.match');
  if(card){
    const id=card.dataset.mid;
    if(state.open!==id){ state.open=id; renderResults(); }
    else if(e.target.closest('.more')||e.target.closest('.mhead')){ state.open=null; renderResults(); }
    return;
  }
  if(!e.target.closest('.searchbox')) hideAC();
});
$('ac').addEventListener('mousedown',e=>{
  const o=e.target.closest('.opt'); if(o){ e.preventDefault(); pick(+o.dataset.i); }
});
$('q').addEventListener('input',renderAC);
$('q').addEventListener('focus',renderAC);
$('q').addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key==='ArrowUp'){
    if(!acItems.length) return; e.preventDefault();
    acIdx=(acIdx+(e.key==='ArrowDown'?1:-1)+acItems.length)%acItems.length;
    const el=$('ac'); el.querySelectorAll('.opt').forEach(o=>o.classList.toggle('sel',+o.dataset.i===acIdx));
  } else if(e.key==='Enter'){
    if(acItems.length) pick(Math.max(0,acIdx));
    else { const {same,other}=suggest($('q').value); const first=same[0]||other[0]; if(first) select(first.it.id,true); }
  } else if(e.key==='Escape'){ hideAC(); }
});
$('dice').addEventListener('click',surprise);
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement!==$('q')){ e.preventDefault(); $('q').focus(); }
});

renderAll();
})();
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {

  });
}
